<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sweet Pet Toys</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Pacifico&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

<!-- EmailJS SDK -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
  emailjs.init('YOUR_PUBLIC_KEY'); /* 替换成你的 EmailJS 公钥 */
</script>

<!-- Confetti 粒子特效 -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

<header>
  <div class="logo">Sweet Pet Toys</div>
  <nav>
    <a href="#">Home</a>
    <a href="#">About Us</a>
    <a href="#">Contact</a>
    <a href="#cart">Cart</a>
  </nav>
</header>

<!-- Banner -->
<section class="banner">
  <img src="images/banner.jpg" alt="Sweet Pet Toys Banner">
  <h1 class="banner-text">WELCOME</h1>
</section>

<main>
  <h2 class="section-title">Hot Toys</h2>
  <div class="products">
    <!-- 猫爪钥匙扣 -->
    <div class="product" data-paylink="https://wise.com/paylink-demo">
      <img src="images/catpaw-keychain.jpg" alt="Cat Paw Keychain">
      <h3>Cat Paw Keychain</h3>
      <p class="description">Cute leather cat paw keychain that can hold your pet's fur 🐾</p>
      <p class="price">¥68</p>
      <button onclick="addToCart('Cat Paw Keychain', 68, 'https://wise.com/paylink-demo')">Add to Cart</button>
    </div>

    <!-- 示例产品 -->
    <div class="product" data-paylink="https://wise.com/paylink-demo">
      <img src="images/toy2.jpg" alt="Pet Ball">
      <h3>Pet Ball</h3>
      <p class="price">¥50</p>
      <button onclick="addToCart('Pet Ball', 50, 'https://wise.com/paylink-demo')">Add to Cart</button>
    </div>
  </div>

  <!-- Shopping Cart Section -->
  <section id="cart">
    <h2>Shopping Cart</h2>
    <div id="cart-items"><p>Your cart is empty.</p></div>
    <p id="cart-total"></p>
    <button id="checkout-btn">Checkout</button>
  </section>
</main>

<footer>
  <p>© 2026 Sweet Pet Toys | Contact: 888-559-56</p>
</footer>

<!-- Checkout Modal -->
<div id="checkoutModal" class="modal">
  <div class="modal-content">
    <span class="close-btn">&times;</span>
    <h2>Shipping Information</h2>
    <form id="checkoutForm">
      <label for="name">Full Name:</label>
      <input type="text" id="name" required>

      <label for="email">Email:</label>
      <input type="email" id="email" required>

      <label for="address">Address:</label>
      <textarea id="address" required></textarea>

      <button type="submit">Proceed to Payment</button>
    </form>
  </div>
</div>

<script src="js/main.js"></script>
</body>
</html>
