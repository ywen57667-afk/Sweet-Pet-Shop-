<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cecilia‘s Shop</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Pacifico&display=swap" rel="stylesheet">

</head>

<body>

<header>

<div class="logo">little Shop 🐾</div>

<nav>
<a href="#">Home</a>
<a href="#">Toys</a>
<a href="#">About</a>
<a href="#cart">Cart</a>
</nav>

</header>


<!-- Banner -->

<section class="banner">
  <img src="images/banner.jpg" alt="Banner">

  <div class="banner-text">
    <h1>Sweet Pet Toys</h1>
    <p>Make Your Pet Happy Every Day 💕</p>
  </div>
</section>



<main>

<h2 class="section-title">Cute Toys</h2>



</div>

<!-- Cat paw keychain -->
<div class="product">
  <img src="images/catpaw-keychain.jpg" alt="Cat Paw Keychain">
  <h3>Cat Paw Keychain</h3>
  <p class="price">¥68</p>
  <button onclick="addToCart('Cat Paw Keychain', 68)">Add to Cart</button>
</div>

<!-- CART -->

<section id="cart">

<h2>Your Cart 🛒</h2>

<div id="cart-items">
<p>Your cart is empty</p>
</div>

<p id="cart-total"></p>

<button id="checkout-btn">Checkout 💖</button>

</section>


</main>


<footer>

<p>Sweet Pet Shop © 2026</p>

</footer>

<script src="js/main.js"></script>

</body>
</html>
